<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Adoção de Cães - ONG</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="header">
        <h1> Adoção Responsável</h1>
        <p>Preencha o formulário para adotar um amigo</p>
    </div>

    <form id="form" class="form">

        <div class="input-group">
            <label>Nome completo</label>
            <input type="text" id="nome">
            <small class="erro"></small>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="text" id="email">
            <small class="erro"></small>
        </div>

        <div class="input-group">
            <label>Telefone</label>
            <input type="text" id="telefone">
            <small class="erro"></small>
        </div>

        <div class="input-group">
            <label>CPF</label>
            <input type="text" id="cpf">
            <small class="erro"></small>
        </div>

        <div class="grid">
            <div class="input-group">
                <label>Idade</label>
                <input type="number" id="idade">
                <small class="erro"></small>
            </div>

            <div class="input-group">
                <label>Cidade</label>
                <input type="text" id="cidade">
                <small class="erro"></small>
            </div>
        </div>

        <div class="grid">
            <div class="input-group">
                <label>Tipo de moradia</label>
                <select id="moradia">
                    <option value="">Selecione</option>
                    <option value="casa">Casa</option>
                    <option value="apartamento">Apartamento</option>
                </select>
            </div>

            <div class="input-group">
                <label>Possui quintal?</label>
                <select id="quintal">
                    <option value="">Selecione</option>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select>
            </div>
        </div>

        <div class="grid">
            <div class="input-group">
                <label>Já teve pet?</label>
                <select id="pet">
                    <option value="">Selecione</option>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select>
            </div>

            <div class="input-group">
                <label>Horas sozinho/dia</label>
                <input type="number" id="horas">
            </div>
        </div>

        <div class="input-group">
            <label>Motivo da adoção</label>
            <textarea id="motivo"></textarea>
        </div>

        <div class="checkbox">
            <input type="checkbox" id="termo">
            <span>Aceito o termo de responsabilidade</span>
        </div>

        <button type="submit" class="btn">Enviar Solicitação</button>

    </form>

    <div id="resultado" class="resultado"></div>

</div>

<script src="script.js"></script>

</body>
</html>
